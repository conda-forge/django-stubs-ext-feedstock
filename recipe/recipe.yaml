schema_version: 1

context:
  name: django-stubs-ext
  version: "6.0.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 3307d42132bc295d5744de6276bc5fdf6896efc70f891e21c0ae8bdf529d2762

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build >=0.11.0,<0.12.0
  run:
    - django
    - python >=${{ python_min }}
    - typing_extensions

tests:
  - python:
      imports:
        - django_stubs_ext
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Monkey-patching and extensions for django-stubs
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://github.com/typeddjango/django-stubs
  repository: https://github.com/typeddjango/django-stubs/tree/master/ext

extra:
  recipe-maintainers:
    - thewchan
